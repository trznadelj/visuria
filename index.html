<!DOCTYPE html>
<html lang="en">
<head>
<title> Visuria </title>
<style>
    #dropzone {
      border: 2px dashed #999;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      font-family: sans-serif;
      font-size: 16px;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
    }

    #dropzone.dragover {
      border-color: #333;
      background-color: #f2f2f2;
    }

    #file-list {
      margin-top: 20px;
      font-family: sans-serif;
      font-size: 14px;
    }

    #file-list ul {
      padding-left: 20px;
    }


        /* 1. Reset margins and make HTML/Body fill the viewport */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }

  </style>
  <!--    <link rel="stylesheet" href="ext/jquery-ui.min.css">-->
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.css">
</head>
<BODY style="margin: 0; padding: 0px">

  
  <!-- Hidden file input as a fallback / click handler -->
  <input id="file-input" type="file" multiple style="display:none" />

  <!--dialog windows -->
  <div id="console_dialog" title="Console dialog">
    <div id="console_output"
      style="border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; background-color: #f9f9f9; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-wrap: break-word;">
    </div>
    <!--- div id="console_output"></div>-->
    <textarea id="console_text" cols="63" rows="6" style="resize:vertical ;"> </textarea> <BR>
    <button id="console_eval">Eval</button>
    <button id="console_clear">Clear</button>
  </div>

  <div id="debug_dialog" title="Debug dialog"> <p id="dump"></p>  </div>
  <div id="floating_dialog" title="Floating dialog"><p id="floating_p">123</p></div>

  <div id="file_dialog" title="File dialog"> 
     Name: <p id="file_dialog__filename" style="background-color: #ccc; text-align: center ;">?</p>
     Type: 
      <select name="file_type" id="file_dialog__file_type">
      </select><hr>
      <p id="file_dialog__cfg_p"></p>
      <hr>
      <input type="button" value="Load" id="file_dialog__load">     
  </div>
  <div id="select_dialog" title="Select dialog" hidden>  </div>
  <div id="help_dialog" title="Help dialog" hidden>  </div>

  <table border="1" cellpadding="0" cellspacing="0" id="table_main" width=100% height=100%>
   <tbody>
   <tr bgcolor="#e0e0e0" height=100%>
    <td bgcolor="#000" style="padding: 0px;">
  

     <!-- Views -->
     <div id="dropzone" >     <font style="color: #3080ff"><center><B>Visuria</B><br><br><img src="images/visuria.png" width="96px"><HR>Drop files here or click to select    </font></div>
     <div id="fs_table"> </div>
     <div id="fs_main" hidden> <canvas id="fs_main_canvas" width="640px" height="480px"></canvas>  </div>
     <div id="modal" title="Modal dialog" hidden><p id="modal_p"></p></div>



    </td>
    </tr>
    <tr bgcolor="#606060"><td>
      <input type="button" value="file" id="open_file_dialog" title="File dialog.">
      <input type="button" value="select" id="open_select_dialog" title="Select dialog.">
      <input type="button" value="debug" id="open_debug_dialog" title="Debug dialog.">
      <input type="button" value="console" id="open_console_dialog" title="Console dialog.">
      <input type="button" value="help" id="open_help_dialog" title="Help dialog.">
      &nbsp; 
      Views:
      <input type="button" value="time" onclick="app_setView('time')">
      <input type="button" value="freq" onclick="app_setView('freq')">  
      <input type="button" value="iq"   onclick="app_setView('iq')"> 
      &nbsp; 
      Color mode:
      <select name="render_mode" id="render_mode" onclick="app_reload_color()">
         <option value="0">amplitude</option> 
         <option value="1">angle</option>
         <option value="2">amplitude + chan</option>
         <option value="3">Channel full</option>
         <option value="4">Resource grid</option>
         <option value="5">White</option>
      </select>
    </td></tr>
  </tbody>
  </table>

</BODY>

  <!-- libs and external dependencies -->
<!--  <script src="ext/jquery-3.7.1.min.js"></script>
  <script src="ext/jquery-ui.min.js"></script>-->
  <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
  <script src="https://code.jquery.com/ui/1.14.1/jquery-ui.js"></script>

  <!-- APP -->
  <script src="js/app.js"></script>
  <script src="js/app_debug.js"></script>
  <script src="js/app_dragdrop.js"></script>
  <script src="js/app_collection.js"></script>
  <!-- dialogs -->
  <script src="js/dialog_console.js"></script>

  <!-- file formats -->
  
  <script src="js/file_iq.js"></script>
  <script src="js/file_csv.js"></script>
  <script src="js/file_json.js"></script>
  <script src="js/file_pcap.js"></script>
  <script src="js/file_bin_tensor.js"></script>

  <script src="js/math_fft.js"></script>

  <!-- views -->
  <script src="js/view_zoom_pan.js"></script>
  <script src="js/view_table.js"></script>
  <script src="js/view_time_iq.js"></script>
  <script src="js/view_freq_iq.js"></script>
  <script src="js/view_plot.js"></script>
  <script src="js/view_3dplot.js"></script>

  <!-- other -->
  <script src="js/tools.js"></script>

  <!-- ML experiment -->
  <script src="js/tech/ml/ml_import.js"></script>
  <script src="js/tech/ml/ml_tensor.js"></script>
  <script src="js/tech/ml/ml_tokenizer.js"></script>
  <script src="js/tech/ml/ml_inference.js"></script>

  <!-- 5G parameters -->
  <script src="js/tech/5g/nr.js"></script>

  <script>
    $( function() { 
       $( "#file_dialog" ).dialog( { width: 350, autoOpen: false } );
       $( "#console_dialog" ).dialog( { width: 620, autoOpen: false } ); 
       $( "#debug_dialog" ).dialog( { width: 450, autoOpen: false } );
       $( "#floating_dialog" ).dialog( { width: 300, autoOpen: false } );

       document.getElementById('console_eval').addEventListener('click', () => evaluateCode());
       document.getElementById('console_clear').addEventListener('click', () => console_clear());
       // CTRL-Enter on console_text to evaluate
       document.getElementById('console_text').addEventListener('keydown', (event) => {
         if (event.ctrlKey && event.key === 'Enter') {
           evaluateCode();
         }
       });
       app_init();
      // onResizeHandler(); // initial resize
      window.addEventListener('resize', onResizeHandler);

      $('#open_debug_dialog').click(function()       { $( "#debug_dialog"  ).dialog     ( "open" );    });
      $('#open_console_dialog').click(function()     { $( "#console_dialog").dialog     ( "open" );    });
      $('#open_file_dialog').click(function()        { $( "#file_dialog"   ).dialog     ( "open" );    });
      $('#open_select_dialog').click(function()      { $( "#select_dialog" ).dialog     ( "open" );    });
      $('#file_dialog__load').click(function()       { app_onFileLoadClicked(); $( "#file_dialog"   ).dialog     ( "close" );     });

      document.getElementById('file_dialog__cfg_p').innerHTML = 
          genCfgTable('file_dialog',
             ['skip_bytes','num_sc','fft_size','NR_u','cp_map','ant_interleaved'], 
             [0,600,1024,1,[80,72,72,72,72,72,72],1]
          );
  

    } );

    function onResizeHandler() {
      /*const canvas = document.getElementById('fs_main_canvas');
      const container = document.getElementById('fs_main');
      const width = container.clientWidth;
      const height = container.clientHeight;
      canvas.width = width;
      canvas.height = height;
*/
      canvas_size_x = document.getElementById('fs_main_canvas').width  =    window.innerWidth-4;
      canvas_size_y = document.getElementById('fs_main_canvas').height =    window.innerHeight-26;      
      if (app.view_freq) {       
        // app.view_freq_iq.resize(width, height);
        app.view_freq.onResize();
        app.view_freq.onRender();
      }
    }

  canvas_size_x = document.getElementById('fs_main_canvas').width  =    window.innerWidth-4;
  canvas_size_y = document.getElementById('fs_main_canvas').height =    window.innerHeight-26;

  function app_reload_color() 
  {
      var mode = Number( document.getElementById('render_mode').options[document.getElementById('render_mode').selectedIndex].value );
      debug("Color mode: "+mode );

      app.view_freq.setColorMode( mode );
      app.view_freq.onRender();
  }

  window.onload     = app_windowOnloadHnd;

  </script>
</HTML>
